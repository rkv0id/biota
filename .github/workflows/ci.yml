name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run checks
        run: just check
