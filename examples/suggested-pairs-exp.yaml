experiments:

  # Density guide:
  # patch: 32 -> creature ~64px visible radius
  # min_dist: 35 -> patch width, patches just touching, solitons immediately in contact
  # min_dist: 50 -> 1.5x patch, small visible gap, creatures within signal range
  # min_dist: 70 -> 2x patch, moderate gap, only signal diffusion bridges them
  # Grid rule: 512x512 comfortably holds 50+ creatures at min_dist=15

  # ── REPULSION: high density territorial ────────────────────────────────────

  # Dense wall -- 15 of each, moderate separation. Do territories form?
  - name: repulsion-340-vs-46-dense
    grid: [512, 512]
    steps: 15000
    snapshot_every: 35
    border: wall
    output_format: gif
    sources:
      - archive_dir: /mnt/scratch/biota/archive
        run: 05-torus-signal-morpho
        creature_id: 20260419-193323-plush-yew-340
        n: 15
      - archive_dir: /mnt/scratch/biota/archive
        run: 06-wall-signal-accumulation
        creature_id: 20260419-193848-quiet-zephyr-46
        n: 15
    spawn:
      patch: 32
      min_dist: 50
      seed: 42

