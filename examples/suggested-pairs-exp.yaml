experiments:

  # ── REPULSION: mutual chemorepulsion -- territorial coexistence ─────────────

  # Wide landscape on torus -- no walls, territories expand freely in both
  # directions. Repulsion should produce a clean vertical split.
  - name: repulsion-340-vs-46-landscape-torus
    grid: [192, 512]
    steps: 15000
    snapshot_every: 35
    border: torus
    output_format: gif
    sources:
      - archive_dir: /mnt/scratch/biota/archive
        run: 05-torus-signal-morpho
        creature_id: 20260419-193323-plush-yew-340
        n: 3
      - archive_dir: /mnt/scratch/biota/archive
        run: 06-wall-signal-accumulation
        creature_id: 20260419-193848-quiet-zephyr-46
        n: 3
    spawn:
      patch: 24
      min_dist: 40
      seed: 42

  # Square wall, large patches -- creatures start with established territory,
  # repulsion plays out from a position of strength rather than scramble.
  - name: repulsion-340-vs-46-big-patch
    grid: [256, 256]
    steps: 12000
    snapshot_every: 30
    border: wall
    output_format: gif
    sources:
      - archive_dir: /mnt/scratch/biota/archive
        run: 05-torus-signal-morpho
        creature_id: 20260419-193323-plush-yew-340
        n: 2
      - archive_dir: /mnt/scratch/biota/archive
        run: 06-wall-signal-accumulation
        creature_id: 20260419-193848-quiet-zephyr-46
        n: 2
    spawn:
      patch: 40
      min_dist: 60
      seed: 42

  # Small tight grid -- repulsion in confined space. Do the species find
  # stable coexistence or does one get pushed into a wall and die?
  - name: repulsion-340-vs-46-tight
    grid: [128, 128]
    steps: 8000
    snapshot_every: 20
    border: wall
    output_format: gif
    sources:
