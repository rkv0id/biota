# biota v2.2.0 ecosystem experiments - v3
#
# v2 lessons:
# - patch=64 was correct (creatures developed natural form, dynamics worked).
# - min_dist needed to be larger: gap = min_dist - patch was 16-36px, which
#   meant kernel reach overlapped immediately. You missed the "here are N
#   discrete creatures" establishment shot before they coupled.
# - Glider-vs-static runs worked well at moderate density; could use more
#   bodies per side.
# - Hetero runs need more steps to play out the full collision -> exchange ->
#   equilibrium arc. 12k cuts off mid-story.
#
# v3 principles:
# - min_dist = patch + 2*reach + buffer ≈ patch + 70 → ~130-140 for patch=64.
#   Gives ~50-70px clear space at init = visible establishment.
# - Homogeneous runs: 10k steps (most resolve fast).
# - Heterogeneous runs: 20k steps (need full collision arc).
# - Bump creature counts where the v2 grid had room.

experiments:

  # ============================================================
  # TORUS BASELINES
  # ============================================================

  - name: pulser-colony-torus
    # wry-spire (25,27,0): dense pulsing colony.
    # Wider min_dist=140 so we see 3 distinct colonies first, then merging.
    grid: 256
    steps: 10000
    snapshot_every: 40
    border: torus
    output_format: gif
    spawn: {min_dist: 160, patch: 64, seed: 0}
    sources:
      - {run: 20260415-031303-wry-spire, cell: [25, 27, 0], n: 3}

  - name: glider-formation-torus
    # noble-fjord (31,20,15) fast translator.
    # min_dist=140 so initial layout is clearly N gliders, then they translate
    # and meet on their own terms.
    grid: [320, 512]
    steps: 12000
    snapshot_every: 48
    border: torus
    output_format: gif
    spawn: {min_dist: 100, patch: 64, seed: 1}
    sources:
      - {run: 20260415-030240-noble-fjord, cell: [31, 20, 15], n: 5}

  - name: woven-diamond-torus
    # frost-creek (19,21,9) structured diamond, very static.
    # Needs space at init or they look like one merged blob immediately.
    grid: 256
    steps: 10000
    snapshot_every: 40
    border: torus
    output_format: gif
    spawn: {min_dist: 130, patch: 64, seed: 2}
    sources:
      - {run: 20260415-014216-frost-creek, cell: [19, 21, 9], n: 3}

  # ============================================================
  # TORUS HETEROGENEOUS — 20k steps for full collision arc, more bodies
  # ============================================================

  - name: gliders-into-pulsers-torus
    # 3 gliders + 4 pulsers (was 2+3). Larger crew = more collision events.
    grid: [320, 512]
    steps: 20000
    snapshot_every: 80
    border: torus
    output_format: gif
    spawn: {min_dist: 130, patch: 64, seed: 3}
    sources:
      - {run: 20260415-030240-noble-fjord, cell: [31, 20, 15], n: 3}
      - {run: 20260415-031303-wry-spire,   cell: [25, 27, 0], n: 4}

  - name: gliders-into-diamonds-torus
    # 3 gliders + 4 diamonds.
    grid: [320, 512]
    steps: 20000
    snapshot_every: 80
    border: torus
    output_format: gif
    spawn: {min_dist: 130, patch: 64, seed: 4}
    sources:
      - {run: 20260415-030240-noble-fjord,  cell: [31, 18, 15], n: 3}
      - {run: 20260415-014216-frost-creek,  cell: [19, 21, 9],  n: 4}

  - name: square-vs-splat-torus
    # 3+3 square vs splat. Both static, want clear establishment shot.
    grid: 256
    steps: 20000
    snapshot_every: 80
    border: torus
    output_format: gif
    spawn: {min_dist: 130, patch: 64, seed: 5}
    sources:
      - {run: 20260415-031303-wry-spire,   cell: [21, 21, 0],  n: 3}
      - {run: 20260415-014216-frost-creek, cell: [21, 12, 10], n: 3}

  - name: triple-faceoff-torus
    # 3 species × 2-3 each. 384² has the room.
    grid: 384
    steps: 20000
    snapshot_every: 80
    border: torus
    output_format: gif
    spawn: {min_dist: 130, patch: 64, seed: 6}
    sources:
      - {run: 20260415-030240-noble-fjord, cell: [26, 19, 15], n: 3}
      - {run: 20260415-014216-frost-creek, cell: [23, 20, 10], n: 3}
      - {run: 20260415-014216-frost-creek, cell: [24, 15, 11], n: 2}

  - name: dense-mixed-long-torus
    # 4 species. Stress test: density + longest run.
    grid: 384
    steps: 20000
    snapshot_every: 80
    border: torus
    output_format: gif
    spawn: {min_dist: 120, patch: 64, seed: 7}
    sources:
      - {run: 20260415-031303-wry-spire,    cell: [25, 27, 0],  n: 2}
      - {run: 20260415-030240-noble-fjord,  cell: [31, 20, 15], n: 2}
      - {run: 20260415-014216-frost-creek,  cell: [19, 20, 10], n: 2}
      - {run: 20260415-014216-frost-creek,  cell: [24, 15, 11], n: 2}

  # ============================================================
  # WALL RUNS
  # ============================================================

  - name: chaotic-blob-wall
    # quiet-cinder (8,24,13): high spec.ent 0.819, low velocity.
    grid: 256
    steps: 10000
    snapshot_every: 40
    border: wall
    output_format: gif
    spawn: {min_dist: 130, patch: 64, seed: 10}
    sources:
      - {run: 20260413-155501-quiet-cinder, cell: [8, 24, 13], n: 3}

  - name: spider-vs-maze-wall
    # quiet-cinder spider vs maze-square. Both static, wall-evolved.
