# biota v2.2.0 ecosystem experiments
#
# 11 runs across two border modes. Three principles after iterating:
#
# 1. min_dist sets when interactions begin, not whether they happen. For
#    static creatures (stay put), keep it at patch + 2*R-ish (~60-80px) so
#    kernel reach already overlaps at init. For translators that close
#    distance themselves, 80-110 is fine. Mixed pairings lean toward the
#    static side's needs.
#
# 2. patch=32 matches the original archive's spawn scale. Below that the
#    creature has to "rebuild" from too little mass and often dies or
#    solidifies. Above it the patch overlaps neighbors at small min_dist.
#
# 3. Landscape grids parse as [H, W] = (height, width). [384, 1024] gives a
#    proper 8:3 ratio so translators have somewhere to go without a square
#    grid wrapping them back on themselves immediately.

experiments:

  # ============================================================
  # TORUS BASELINES: each interesting cell alone, dense enough to interact
  # ============================================================

  - name: pulser-colony-torus
    # wry-spire (25,27,0): dense pulsing colony with internal sub-bodies.
    # Tight spacing (60) so the kernel reaches overlap immediately. Should
    # show whether colonies merge into one super-organism or repel.
    grid: 512
    steps: 10000
    snapshot_every: 40
    border: torus
    output_format: gif
    spawn: {min_dist: 65, patch: 32, seed: 0}
    sources:
      - {run: 20260415-031303-wry-spire, cell: [25, 27, 0], n: 6}

  - name: glider-formation-torus
    # noble-fjord (31,20,15): fast translator+rotator (DISPL 0.971,
    # ANG.VEL 1.0). Wider spacing (110) since they'll close distance via
    # translation. Landscape 8:3 so they have somewhere to go.
    grid: [384, 1024]
    steps: 12000
    snapshot_every: 48
    border: torus
    output_format: gif
    spawn: {min_dist: 100, patch: 32, seed: 1}
    sources:
      - {run: 20260415-030240-noble-fjord, cell: [31, 20, 15], n: 5}

  - name: woven-diamond-torus
    # frost-creek (19,21,9): structured diamond, GRAD 0.687. Very static.
    # Need tight spacing (60) or they just sit there as four separate
    # diamonds forever.
    grid: 512
    steps: 10000
    snapshot_every: 40
    border: torus
    output_format: gif
    spawn: {min_dist: 60, patch: 32, seed: 2}
    sources:
      - {run: 20260415-014216-frost-creek, cell: [19, 21, 9], n: 4}

  # ============================================================
  # TORUS HETEROGENEOUS: pairwise and three-way
  # ============================================================

  - name: gliders-into-pulsers-torus
    # 3 fast translators meet a field of 4 dense pulsers. Static side wants
    # tight spacing (75), gliders will get there on their own. Landscape so
    # gliders have pre-collision travel distance.
    grid: [384, 1024]
    steps: 12000
    snapshot_every: 48
    border: torus
    output_format: gif
    spawn: {min_dist: 75, patch: 32, seed: 3}
    sources:
      - {run: 20260415-030240-noble-fjord, cell: [31, 20, 15], n: 3}
      - {run: 20260415-031303-wry-spire,   cell: [25, 27, 0], n: 4}

  - name: gliders-into-diamonds-torus
    # Asymmetric translator (noble-fjord 31,18,15) into structured diamonds.
    # Diamond's internal structure should resist or absorb incoming flow.
    grid: [384, 1024]
    steps: 12000
    snapshot_every: 48
    border: torus
    output_format: gif
    spawn: {min_dist: 75, patch: 32, seed: 4}
    sources:
      - {run: 20260415-030240-noble-fjord,  cell: [31, 18, 15], n: 3}
      - {run: 20260415-014216-frost-creek,  cell: [19, 21, 9],  n: 3}

  - name: square-vs-splat-torus
    # wry-spire (21,21,0) crystalline square against frost-creek (21,12,10)
    # tendril splat. Both static, very different morphologies. Need tight
    # spacing or they ignore each other.
    grid: 512
    steps: 10000
    snapshot_every: 40
    border: torus
    output_format: gif
    spawn: {min_dist: 65, patch: 32, seed: 5}
    sources:
      - {run: 20260415-031303-wry-spire,   cell: [21, 21, 0],  n: 3}
      - {run: 20260415-014216-frost-creek, cell: [21, 12, 10], n: 3}

  - name: triple-faceoff-torus
    # Pure translator + structured static + diffuse colony. Three playstyles.
    # Mid-range spacing (80) since one species translates and the other two
    # are static-but-active.
    grid: [384, 1024]
    steps: 12000
    snapshot_every: 48
    border: torus
    output_format: gif
    spawn: {min_dist: 80, patch: 32, seed: 6}
    sources:
      - {run: 20260415-030240-noble-fjord, cell: [26, 19, 15], n: 3}
      - {run: 20260415-014216-frost-creek, cell: [23, 20, 10], n: 3}
      - {run: 20260415-014216-frost-creek, cell: [24, 15, 11], n: 3}

  - name: dense-mixed-long-torus
    # 4 species, 3 each. Stress test: high density, long run, who outlasts.
    # Tight spacing (60) deliberately to force interactions immediately.
    grid: 512
    steps: 15000
    snapshot_every: 60
    border: torus
    output_format: gif
    spawn: {min_dist: 60, patch: 32, seed: 7}
    sources:
      - {run: 20260415-031303-wry-spire,    cell: [25, 27, 0],  n: 3}
      - {run: 20260415-030240-noble-fjord,  cell: [31, 20, 15], n: 3}
      - {run: 20260415-014216-frost-creek,  cell: [19, 20, 10], n: 3}
      - {run: 20260415-014216-frost-creek,  cell: [24, 15, 11], n: 3}

  # ============================================================
  # WALL RUNS: quiet-cinder creatures evolved under wall dynamics.
  # Mass clamps at boundary instead of wrapping; creatures pile up on edges.
  # ============================================================

  - name: chaotic-blob-wall
    # quiet-cinder (8,24,13): high spectral entropy 0.819, low velocity
    # 0.268 - internally chaotic blob that doesn't translate. Three of them,
    # tight spacing, see whether they fuse into one bigger chaotic mass or
    # maintain identity.
    grid: 512
    steps: 10000
    snapshot_every: 40
    border: wall
    output_format: gif
    spawn: {min_dist: 70, patch: 32, seed: 10}
    sources:
      - {run: 20260413-155501-quiet-cinder, cell: [8, 24, 13], n: 4}

  - name: spider-vs-maze-wall
    # quiet-cinder (6,20,13): radial spider/coronavirus form, q=0.9998,
    # very low velocity 0.192 - extremely static.
    # vs (6,17,13): maze-square structured interior, q=1.000, also slow.
    # Both static, both wall-evolved, very different morphology. Wall border
    # adds the question of how they behave when pinned against an edge.
    grid: 512
    steps: 12000
    snapshot_every: 48
    border: wall
    output_format: gif
    spawn: {min_dist: 70, patch: 32, seed: 11}
    sources:
      - {run: 20260413-155501-quiet-cinder, cell: [6, 20, 13], n: 3}
      - {run: 20260413-155501-quiet-cinder, cell: [6, 17, 13], n: 3}

  - name: wall-stress-trio
    # Three quiet-cinder species, 3 each, dense, long. Wall analog of
    # dense-mixed-long-torus. Tests whether wall-evolved creatures behave
    # differently in a packed wall environment than torus-evolved creatures
    # do in a packed torus environment.
    grid: 512
    steps: 15000
    snapshot_every: 60
    border: wall
    output_format: gif
    spawn: {min_dist: 65, patch: 32, seed: 12}
    sources:
      - {run: 20260413-155501-quiet-cinder, cell: [8, 24, 13], n: 3}
      - {run: 20260413-155501-quiet-cinder, cell: [6, 20, 13], n: 3}
      - {run: 20260413-155501-quiet-cinder, cell: [6, 17, 13], n: 3}
