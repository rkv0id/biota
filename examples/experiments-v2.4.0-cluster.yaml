# Cluster ecosystem experiments for v2.4.0.
#
# Cells from the atlas screenshots (20260415):
#   keen-harbor (TORUS, displ/ang_vel/vel):
#     (30, 15, 5)   compact ringed glider, mid-fast
#     (30, 31, 8)   max ang_vel, fast, textured small square
#     (31, 31, 7)   speckled blob, max ang_vel near-pure glider
#   ochre-bramble (WALL, vel/gyr/spec_ent):
#     (4, 30, 12)   large sparse polka-dot disk, slow + spectrally rich
#     (10, 26, 13)  nested-square with core, mid-mobile, very complex
#     (8, 28, 13)   pitted hollow form, large gyradius, high entropy
#     (9, 23, 13)   star-like with central node, mid-vel
#   noble-fjord (TORUS, ang_vel/asym/displ):
#     (26, 19, 15)  pure glider, patchy textured body
#
# Schema notes: device comes from the CLI (--device cuda). archive_dir
# defaults from --archive-dir. No global block; each experiment is
# fully self-contained.

experiments:

  # === Homogeneous controls ===

  - name: keen-harbor-glider-cluster
    grid: 256
    steps: 10000
    snapshot_every: 100
    border: torus
    output_format: gif
    spawn:
      min_dist: 130
      patch: 64
      seed: 42
    sources:
      - run: 20260415-013157-keen-harbor
        cell: [30, 31, 8]
        n: 6

  - name: ochre-bramble-substrate
    grid: 256
    steps: 10000
    snapshot_every: 100
    border: wall
    output_format: gif
    spawn:
      min_dist: 180
      patch: 128
      seed: 42
    sources:
      - run: 20260413-154511-ochre-bramble
        cell: [10, 26, 13]
        n: 4

  # === Heterogeneous mixes ===

  # Three keen-harbor gliders racing on torus. Intra-archive interaction
  # where all creatures share the same descriptor regime and patch sizing.
  - name: keen-harbor-glider-trio
    grid: 384
    steps: 20000
    snapshot_every: 200
    border: torus
    output_format: gif
    spawn:
      min_dist: 140
      patch: 64
      seed: 42
    sources:
      - run: 20260415-013157-keen-harbor
        cell: [30, 15, 5]
        n: 4
      - run: 20260415-013157-keen-harbor
        cell: [30, 31, 8]
        n: 4
      - run: 20260415-013157-keen-harbor
        cell: [31, 31, 7]
        n: 4

  # Mobile gliders meet spectrally-rich substrates. Per-source patch
  # gives the large ochre-bramble cell its needed canvas while keeping
  # the keen-harbor glider compact.
  - name: gliders-vs-substrate
    grid: 384
    steps: 20000
    snapshot_every: 200
    border: torus
    output_format: gif
    spawn:
      min_dist: 170
      patch: 64
      seed: 42
    sources:
      - run: 20260415-013157-keen-harbor
        cell: [30, 31, 8]
        n: 6
        patch: 64
      - run: 20260413-154511-ochre-bramble
        cell: [4, 30, 12]
        n: 3
        patch: 128

  # Three ochre-bramble species coexisting. All large, all spectrally
  # complex, low mobility. Tests whether high-entropy patterns interfere
  # constructively or destructively when they share a canvas.
  - name: ochre-bramble-substrate-trio
    grid: 384
    steps: 20000
    snapshot_every: 200
    border: wall
    output_format: gif
    spawn:
      min_dist: 200
      patch: 128
      seed: 42
    sources:
      - run: 20260413-154511-ochre-bramble
        cell: [10, 26, 13]
        n: 3
      - run: 20260413-154511-ochre-bramble
        cell: [8, 28, 13]
        n: 3
      - run: 20260413-154511-ochre-bramble
        cell: [9, 23, 13]
        n: 3

  # Cross-archive cross-regime mix: noble-fjord glider + keen-harbor
  # glider + ochre-bramble substrate, on torus. Three archives, three
  # descriptor regimes. The headline run.
  - name: cross-archive-cross-regime
    grid: 384
    steps: 20000
    snapshot_every: 200
    border: torus
    output_format: gif
    spawn:
      min_dist: 170
      patch: 64
      seed: 42
    sources:
      - run: 20260415-030240-noble-fjord
        cell: [26, 19, 15]
        n: 4
        patch: 64
      - run: 20260415-013157-keen-harbor
        cell: [30, 15, 5]
        n: 4
        patch: 64
      - run: 20260413-154511-ochre-bramble
        cell: [9, 23, 13]
        n: 3
        patch: 96
