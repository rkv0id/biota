<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>biota inter-species signal coupling</title>
  <desc>Signal coupling between two species is determined by dot products between emission vectors and receptor profiles. dot(emission_A, receptor_B) governs how A's chemical output affects B's growth, and vice versa. Both positive: mutual chemotaxis (species attract each other). Both negative: mutual chemorepulsion (species partition space). One positive, one negative: asymmetric pursuit dynamics. Near-zero: chemically blind (pure spatial competition). Alpha_coupling scales the strength of all coupling effects.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .th     { font-size: 13px; font-weight: 500; fill: #e4e4e7; }
      .ts     { font-size: 11px; font-weight: 400; fill: #a1a1aa; }
      .tsa    { font-size: 10px; font-weight: 400; fill: #71717a; }
      .tlabel { font-size: 10px; font-weight: 500; fill: #52525b; letter-spacing: 0.07em; }
      .mono   { font-size: 9.5px; font-family: "SF Mono","Fira Code",monospace; fill: #71717a; }
    </style>
  </defs>

  <!-- ═══ SPECIES A ═══ -->
  <rect x="28" y="20" width="180" height="130" rx="6" fill="#16181f" stroke="#ff8c32" stroke-width="1"/>
  <text class="tlabel" x="44" y="38" fill="#ff8c32">SPECIES A</text>
  <text class="ts"  x="118" y="64"  text-anchor="middle" dominant-baseline="central">emission_vector</text>
  <text class="mono" x="118" y="80"  text-anchor="middle">ev_A = [0.8, 0.1, …]</text>
  <text class="ts"  x="118" y="100" text-anchor="middle" dominant-baseline="central">receptor_profile</text>
  <text class="mono" x="118" y="116" text-anchor="middle">rp_A = [−0.6, 0.3, …]</text>
  <!-- species A blob -->
  <circle cx="118" cy="136" r="12" fill="#ff8c32" opacity="0.25" stroke="#ff8c32" stroke-width="0.5"/>
  <circle cx="118" cy="136" r="6" fill="#ff8c32" opacity="0.6"/>

  <!-- ═══ SPECIES B ═══ -->
  <rect x="472" y="20" width="180" height="130" rx="6" fill="#16181f" stroke="#50b4ff" stroke-width="1"/>
  <text class="tlabel" x="488" y="38" fill="#50b4ff">SPECIES B</text>
  <text class="ts"  x="562" y="64"  text-anchor="middle" dominant-baseline="central">emission_vector</text>
  <text class="mono" x="562" y="80"  text-anchor="middle">ev_B = [0.1, 0.7, …]</text>
  <text class="ts"  x="562" y="100" text-anchor="middle" dominant-baseline="central">receptor_profile</text>
  <text class="mono" x="562" y="116" text-anchor="middle">rp_B = [0.2, −0.8, …]</text>
  <!-- species B blob -->
  <circle cx="562" cy="136" r="12" fill="#50b4ff" opacity="0.25" stroke="#50b4ff" stroke-width="0.5"/>
  <circle cx="562" cy="136" r="6" fill="#50b4ff" opacity="0.6"/>

  <!-- Signal arrows between species -->
  <!-- A → B: A emits, B receives -->
  <path d="M208 75 L472 75" fill="none" stroke="#ff8c32" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="tsa" x="340" y="66" text-anchor="middle" fill="#ff8c32">A emits → B receives</text>
  <!-- B → A: B emits, A receives -->
  <path d="M472 105 L208 105" fill="none" stroke="#50b4ff" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="tsa" x="340" y="117" text-anchor="middle" fill="#50b4ff">B emits → A receives</text>

  <!-- Dot product labels in centre -->
  <rect x="246" y="60" width="188" height="60" rx="4" fill="#1c1e27" stroke="#3e4160" stroke-width="0.5"/>
  <text class="mono" x="340" y="80"  text-anchor="middle" fill="#a1a1aa">dot(ev_A, rp_B) → A→B</text>
  <text class="mono" x="340" y="98"  text-anchor="middle" fill="#a1a1aa">dot(ev_B, rp_A) → B→A</text>
  <text class="tsa"  x="340" y="114" text-anchor="middle">α scales both</text>

  <!-- ═══ INTERACTION MATRIX ═══ -->
  <text class="tlabel" x="44" y="178">INTERACTION TYPES  —  sign(A→B) × sign(B→A)</text>

  <!-- Chemotaxis cell: both positive -->
  <rect x="28"  y="192" width="148" height="110" rx="5" fill="#0f1f1e" stroke="#3cdcc8" stroke-width="1"/>
  <text class="th"  x="102" y="218" text-anchor="middle" dominant-baseline="central" fill="#3cdcc8">chemotaxis</text>
  <text class="ts"  x="102" y="238" text-anchor="middle" dominant-baseline="central">both positive</text>
  <text class="tsa" x="102" y="256" text-anchor="middle">A→B &gt; 0,  B→A &gt; 0</text>
  <text class="tsa" x="102" y="272" text-anchor="middle">species attract</text>
  <text class="tsa" x="102" y="290" text-anchor="middle">compete for space</text>
  <!-- arrows converging -->
  <circle cx="68"  cy="296" r="5" fill="#ff8c32" opacity="0.7"/>
  <circle cx="136" cy="296" r="5" fill="#50b4ff" opacity="0.7"/>
  <path d="M73 296 L98 296" fill="none" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M131 296 L106 296" fill="none" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Chemorepulsion cell: both negative -->
  <rect x="192" y="192" width="148" height="110" rx="5" fill="#1e0f0f" stroke="#ff6464" stroke-width="1"/>
  <text class="th"  x="266" y="218" text-anchor="middle" dominant-baseline="central" fill="#ff6464">chemorepulsion</text>
  <text class="ts"  x="266" y="238" text-anchor="middle" dominant-baseline="central">both negative</text>
  <text class="tsa" x="266" y="256" text-anchor="middle">A→B &lt; 0,  B→A &lt; 0</text>
  <text class="tsa" x="266" y="272" text-anchor="middle">species repel</text>
  <text class="tsa" x="266" y="290" text-anchor="middle">partition territory</text>
  <!-- arrows diverging -->
  <circle cx="238" cy="296" r="5" fill="#ff8c32" opacity="0.7"/>
  <circle cx="294" cy="296" r="5" fill="#50b4ff" opacity="0.7"/>
  <path d="M232 296 L212 296" fill="none" stroke="#ff6464" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M300 296 L318 296" fill="none" stroke="#ff6464" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Pursuit cell: mixed signs -->
  <rect x="356" y="192" width="148" height="110" rx="5" fill="#1a1508" stroke="#fbbf77" stroke-width="1"/>
  <text class="th"  x="430" y="218" text-anchor="middle" dominant-baseline="central" fill="#fbbf77">pursuit</text>
  <text class="ts"  x="430" y="238" text-anchor="middle" dominant-baseline="central">mixed signs</text>
  <text class="tsa" x="430" y="256" text-anchor="middle">one positive,</text>
  <text class="tsa" x="430" y="270" text-anchor="middle">one negative</text>
  <text class="tsa" x="430" y="290" text-anchor="middle">pursuer + prey</text>
  <!-- arrow one way -->
  <circle cx="396" cy="296" r="5" fill="#ff8c32" opacity="0.7"/>
  <circle cx="462" cy="296" r="5" fill="#50b4ff" opacity="0.7"/>
  <path d="M401 296 L458 296" fill="none" stroke="#fbbf77" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Blind cell: near zero -->
  <rect x="520" y="192" width="148" height="110" rx="5" fill="#16181f" stroke="#3f3f46" stroke-width="0.8"/>
  <text class="th"  x="594" y="218" text-anchor="middle" dominant-baseline="central">blind</text>
  <text class="ts"  x="594" y="238" text-anchor="middle" dominant-baseline="central">near zero</text>
  <text class="tsa" x="594" y="256" text-anchor="middle">|A→B| ≈ 0  or</text>
  <text class="tsa" x="594" y="270" text-anchor="middle">|B→A| ≈ 0</text>
  <text class="tsa" x="594" y="290" text-anchor="middle">spatial only</text>
  <!-- no signal arrow, just dots -->
  <circle cx="558" cy="296" r="5" fill="#ff8c32" opacity="0.5"/>
  <circle cx="630" cy="296" r="5" fill="#50b4ff" opacity="0.5"/>
  <line x1="563" y1="296" x2="626" y2="296" stroke="#52525b" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ═══ ALPHA COUPLING NOTE ═══ -->
  <rect x="28" y="320" width="640" height="52" rx="5" fill="#16181f" stroke="#3a3d52" stroke-width="0.8"/>
  <text class="ts"  x="348" y="342" text-anchor="middle" dominant-baseline="central">α &gt; 0 (chemotaxis): signal reception amplifies growth in saturated cells → species drifts toward signal source</text>
  <text class="ts"  x="348" y="360" text-anchor="middle" dominant-baseline="central">α &lt; 0 (chemorepulsion): signal reception suppresses growth → species drifts away from signal source</text>
  <text class="tsa" x="348" y="376" text-anchor="middle">no mass is transferred — signal biases the flow field, total ecosystem mass is conserved</text>

</svg>
