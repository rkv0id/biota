<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>biota inter-species signal coupling</title>
  <desc>Signal coupling between two species is determined by dot products between emission vectors and receptor profiles. dot(emission_A, receptor_B) governs how A's chemical output affects B's growth, and vice versa. Both positive: mutual chemotaxis. Both negative: mutual chemorepulsion. Mixed: asymmetric pursuit. Near-zero: chemically blind. Alpha_coupling scales all coupling effects.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .th     { font-size: 13px; font-weight: 500; fill: #e4e4e7; }
      .ts     { font-size: 11px; font-weight: 400; fill: #a1a1aa; }
      .tsa    { font-size: 10px; font-weight: 400; fill: #71717a; }
      .tlabel { font-size: 10px; font-weight: 500; fill: #52525b; letter-spacing: 0.07em; }
      .mono   { font-size: 9.5px; font-family: "SF Mono","Fira Code",monospace; fill: #71717a; }
    </style>
  </defs>

  <!-- ═══ SPECIES PANELS ═══ -->
  <rect x="28"  y="20" width="174" height="140" rx="6" fill="#16181f" stroke="#ff8c32" stroke-width="1"/>
  <text class="tlabel" x="44"  y="38" fill="#ff8c32">SPECIES A</text>
  <text class="ts"   x="115" y="62"  text-anchor="middle" dominant-baseline="central">emission_vector</text>
  <text class="mono" x="115" y="78"  text-anchor="middle">ev_A = [0.8, 0.1, …]</text>
  <text class="ts"   x="115" y="98"  text-anchor="middle" dominant-baseline="central">receptor_profile</text>
  <text class="mono" x="115" y="114" text-anchor="middle">rp_A = [−0.6, 0.3, …]</text>
  <circle cx="115" cy="143" r="11" fill="#ff8c32" opacity="0.22" stroke="#ff8c32" stroke-width="0.5"/>
  <circle cx="115" cy="143" r="5.5" fill="#ff8c32" opacity="0.7"/>

  <rect x="478" y="20" width="174" height="140" rx="6" fill="#16181f" stroke="#50b4ff" stroke-width="1"/>
  <text class="tlabel" x="494" y="38" fill="#50b4ff">SPECIES B</text>
  <text class="ts"   x="565" y="62"  text-anchor="middle" dominant-baseline="central">emission_vector</text>
  <text class="mono" x="565" y="78"  text-anchor="middle">ev_B = [0.1, 0.7, …]</text>
  <text class="ts"   x="565" y="98"  text-anchor="middle" dominant-baseline="central">receptor_profile</text>
  <text class="mono" x="565" y="114" text-anchor="middle">rp_B = [0.2, −0.8, …]</text>
  <circle cx="565" cy="143" r="11" fill="#50b4ff" opacity="0.22" stroke="#50b4ff" stroke-width="0.5"/>
  <circle cx="565" cy="143" r="5.5" fill="#50b4ff" opacity="0.7"/>

  <!-- ═══ CENTER DOT-PRODUCT BOX (drawn BEFORE arrows so arrows render on top) ═══ -->
  <rect x="234" y="68" width="212" height="54" rx="4" fill="#1c1e27" stroke="#3e4160" stroke-width="0.5"/>
  <text class="mono" x="340" y="86"  text-anchor="middle" fill="#a1a1aa">dot(ev_A, rp_B) → A→B</text>
  <text class="mono" x="340" y="102" text-anchor="middle" fill="#a1a1aa">dot(ev_B, rp_A) → B→A</text>
  <text class="tsa"  x="340" y="116" text-anchor="middle">α scales both</text>

  <!-- ═══ SIGNAL ARROWS (drawn AFTER center box so they render on top) ═══ -->
  <!-- A emits → B receives (above center box) -->
  <path d="M202 62 L234 62" fill="none" stroke="#ff8c32" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <path d="M446 62 L478 62" fill="none" stroke="#ff8c32" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="tsa" x="340" y="56" text-anchor="middle" fill="#ff8c32">A emits → B receives</text>

  <!-- B emits → A receives (below center box) -->
  <path d="M478 128 L446 128" fill="none" stroke="#50b4ff" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <path d="M234 128 L202 128" fill="none" stroke="#50b4ff" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="tsa" x="340" y="142" text-anchor="middle" fill="#50b4ff">B emits → A receives</text>

  <!-- ═══ INTERACTION MATRIX ═══ -->
  <text class="tlabel" x="28" y="182">INTERACTION TYPES  —  sign(A→B) × sign(B→A)</text>

  <!-- CHEMOTAXIS: x=28, y=194, w=148, h=122 -->
  <rect x="28"  y="194" width="148" height="122" rx="5" fill="#0f1f1e" stroke="#3cdcc8" stroke-width="1"/>
  <text class="th"  x="102" y="216" text-anchor="middle" fill="#3cdcc8">chemotaxis</text>
  <text class="ts"  x="102" y="232" text-anchor="middle">both positive</text>
  <text class="tsa" x="102" y="248" text-anchor="middle">A→B &gt; 0,  B→A &gt; 0</text>
  <text class="tsa" x="102" y="262" text-anchor="middle">species attract</text>
  <text class="tsa" x="102" y="275" text-anchor="middle">compete for space</text>
  <circle cx="64"  cy="303" r="5" fill="#ff8c32" opacity="0.7"/>
  <circle cx="140" cy="303" r="5" fill="#50b4ff" opacity="0.7"/>
  <path d="M69 303 L96 303"  fill="none" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M135 303 L108 303" fill="none" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- CHEMOREPULSION: x=192, y=194, w=148, h=122 -->
  <rect x="192" y="194" width="148" height="122" rx="5" fill="#1e0f0f" stroke="#ff6464" stroke-width="1"/>
  <text class="th"  x="266" y="216" text-anchor="middle" fill="#ff6464">chemorepulsion</text>
  <text class="ts"  x="266" y="232" text-anchor="middle">both negative</text>
  <text class="tsa" x="266" y="248" text-anchor="middle">A→B &lt; 0,  B→A &lt; 0</text>
  <text class="tsa" x="266" y="262" text-anchor="middle">species repel</text>
  <text class="tsa" x="266" y="275" text-anchor="middle">partition territory</text>
  <circle cx="228" cy="303" r="5" fill="#ff8c32" opacity="0.7"/>
  <circle cx="304" cy="303" r="5" fill="#50b4ff" opacity="0.7"/>
  <path d="M222 303 L206 303" fill="none" stroke="#ff6464" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M310 303 L326 303" fill="none" stroke="#ff6464" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- PURSUIT: x=356, y=194, w=148, h=122 -->
  <rect x="356" y="194" width="148" height="122" rx="5" fill="#1a1508" stroke="#fbbf77" stroke-width="1"/>
  <text class="th"  x="430" y="216" text-anchor="middle" fill="#fbbf77">pursuit</text>
  <text class="ts"  x="430" y="232" text-anchor="middle">mixed signs</text>
  <text class="tsa" x="430" y="248" text-anchor="middle">one positive,</text>
  <text class="tsa" x="430" y="262" text-anchor="middle">one negative</text>
  <text class="tsa" x="430" y="275" text-anchor="middle">pursuer + prey</text>
  <circle cx="392" cy="303" r="5" fill="#ff8c32" opacity="0.7"/>
  <circle cx="468" cy="303" r="5" fill="#50b4ff" opacity="0.7"/>
  <path d="M397 303 L464 303" fill="none" stroke="#fbbf77" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- BLIND: x=520, y=194, w=148, h=122 -->
  <rect x="520" y="194" width="148" height="122" rx="5" fill="#16181f" stroke="#3f3f46" stroke-width="0.8"/>
  <text class="th"  x="594" y="216" text-anchor="middle">blind</text>
  <text class="ts"  x="594" y="232" text-anchor="middle">near zero</text>
  <text class="tsa" x="594" y="248" text-anchor="middle">|A→B| ≈ 0  or</text>
  <text class="tsa" x="594" y="262" text-anchor="middle">|B→A| ≈ 0</text>
  <text class="tsa" x="594" y="275" text-anchor="middle">spatial only</text>
  <circle cx="556" cy="303" r="5" fill="#ff8c32" opacity="0.5"/>
  <circle cx="632" cy="303" r="5" fill="#50b4ff" opacity="0.5"/>
  <line x1="561" y1="303" x2="628" y2="303" stroke="#52525b" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ═══ ALPHA NOTE ═══ -->
  <rect x="28" y="334" width="640" height="80" rx="5" fill="#16181f" stroke="#3a3d52" stroke-width="0.8"/>
  <text class="ts"  x="348" y="356" text-anchor="middle">α &gt; 0 (chemotaxis): signal reception amplifies growth in saturated cells → species drifts toward signal source</text>
  <text class="ts"  x="348" y="374" text-anchor="middle">α &lt; 0 (chemorepulsion): signal reception suppresses growth → species drifts away from signal source</text>
  <text class="tsa" x="348" y="394" text-anchor="middle">no mass is transferred — signal biases the flow field, total ecosystem mass is conserved</text>

</svg>
