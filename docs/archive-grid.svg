<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>biota archive grid</title>
  <desc>The biota archive is a CVT-MAP-Elites archive. Three behavioral descriptors index its axes -- chosen from a library of 18 (velocity, gyradius, spectral entropy, and more). Before search begins, a calibration phase fits k-means centroids to the observed descriptor distribution, placing cells where creatures actually live in behavioral space. Each cell holds the highest-quality creature in its Voronoi region. Bright magma colors indicate occupied cells; dark cells are empty.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      /* Light-mode defaults (GitHub README on a light page, print, etc.) */
      .tsh  { font-size: 11px; font-weight: 600; fill: #3f3f46; }
      .tsa  { font-size: 10px; font-weight: 400; fill: #71717a; }
      .tsax { font-size: 10px; font-weight: 500; fill: #52525b; }
      .axis-line { stroke: #d4d4d8; }
      /* Dark-mode overrides: inherit when the host page is dark
         (atlas index, GitHub dark theme, etc.) so text stays readable. */
      @media (prefers-color-scheme: dark) {
        .tsh  { fill: #e4e4e7; }
        .tsa  { fill: #a1a1aa; }
        .tsax { fill: #71717a; }
        .axis-line { stroke: #52525b; }
      }
    </style>
  </defs>

  <!-- Grid: 7 cols x 7 rows, cell 34x26, gap 3, origin x=148 y=44 -->
  <!-- col x positions: 148 185 222 259 296 333 370  (step 37) -->
  <!-- row y positions:  44  73 102 131 160 189 218  (step 29) -->

  <!-- Row 0 (fastest) -->
  <rect x="148" y="44"  width="34" height="26" rx="2" fill="#200828" stroke="#3f3f46" stroke-width="0.3"/>
  <rect x="185" y="44"  width="34" height="26" rx="2" fill="#4a1030" stroke="#52525b" stroke-width="0.3"/>
  <rect x="222" y="44"  width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="259" y="44"  width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="296" y="44"  width="34" height="26" rx="2" fill="#781838" stroke="#71717a" stroke-width="0.3"/>
  <rect x="333" y="44"  width="34" height="26" rx="2" fill="#9c2040" stroke="#71717a" stroke-width="0.3"/>
  <rect x="370" y="44"  width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>

  <!-- Row 1 -->
  <rect x="148" y="73"  width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="185" y="73"  width="34" height="26" rx="2" fill="#300c30" stroke="#3f3f46" stroke-width="0.3"/>
  <rect x="222" y="73"  width="34" height="26" rx="2" fill="#6a1840" stroke="#52525b" stroke-width="0.3"/>
  <rect x="259" y="73"  width="34" height="26" rx="2" fill="#b02840" stroke="#71717a" stroke-width="0.3"/>
  <rect x="296" y="73"  width="34" height="26" rx="2" fill="#cc3838" stroke="#71717a" stroke-width="0.3"/>
  <rect x="333" y="73"  width="34" height="26" rx="2" fill="#d84820" stroke="#a1a1aa" stroke-width="0.3"/>
  <rect x="370" y="73"  width="34" height="26" rx="2" fill="#b82c20" stroke="#71717a" stroke-width="0.3"/>

  <!-- Row 2 -->
  <rect x="148" y="102" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="185" y="102" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="222" y="102" width="34" height="26" rx="2" fill="#380c28" stroke="#3f3f46" stroke-width="0.3"/>
  <rect x="259" y="102" width="34" height="26" rx="2" fill="#8c2040" stroke="#52525b" stroke-width="0.3"/>
  <rect x="296" y="102" width="34" height="26" rx="2" fill="#dc5820" stroke="#a1a1aa" stroke-width="0.3"/>
  <rect x="333" y="102" width="34" height="26" rx="2" fill="#f07018" stroke="#a1a1aa" stroke-width="0.5"/>
  <rect x="370" y="102" width="34" height="26" rx="2" fill="#e06018" stroke="#a1a1aa" stroke-width="0.3"/>

  <!-- Row 3 -->
  <rect x="148" y="131" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="185" y="131" width="34" height="26" rx="2" fill="#1e0818" stroke="#3f3f46" stroke-width="0.3"/>
  <rect x="222" y="131" width="34" height="26" rx="2" fill="#5c1430" stroke="#3f3f46" stroke-width="0.3"/>
  <rect x="259" y="131" width="34" height="26" rx="2" fill="#c04030" stroke="#71717a" stroke-width="0.3"/>
  <rect x="296" y="131" width="34" height="26" rx="2" fill="#f08020" stroke="#a1a1aa" stroke-width="0.5"/>
  <rect x="333" y="131" width="34" height="26" rx="2" fill="#f8a028" stroke="#a1a1aa" stroke-width="0.5"/>
  <rect x="370" y="131" width="34" height="26" rx="2" fill="#f08828" stroke="#a1a1aa" stroke-width="0.5"/>

  <!-- Row 4 -->
  <rect x="148" y="160" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="185" y="160" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="222" y="160" width="34" height="26" rx="2" fill="#280818" stroke="#3f3f46" stroke-width="0.3"/>
  <rect x="259" y="160" width="34" height="26" rx="2" fill="#8c2030" stroke="#52525b" stroke-width="0.3"/>
  <rect x="296" y="160" width="34" height="26" rx="2" fill="#e06820" stroke="#71717a" stroke-width="0.3"/>
  <rect x="333" y="160" width="34" height="26" rx="2" fill="#f8b840" stroke="#a1a1aa" stroke-width="0.5"/>
  <rect x="370" y="160" width="34" height="26" rx="2" fill="#f8c858" stroke="#a1a1aa" stroke-width="0.5"/>

  <!-- Row 5 -->
  <rect x="148" y="189" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="185" y="189" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="222" y="189" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="259" y="189" width="34" height="26" rx="2" fill="#581420" stroke="#3f3f46" stroke-width="0.3"/>
  <rect x="296" y="189" width="34" height="26" rx="2" fill="#c84020" stroke="#71717a" stroke-width="0.3"/>
  <rect x="333" y="189" width="34" height="26" rx="2" fill="#f0a030" stroke="#a1a1aa" stroke-width="0.5"/>
  <rect x="370" y="189" width="34" height="26" rx="2" fill="#fcd880" stroke="#d4d4d8" stroke-width="0.5"/>

  <!-- Row 6 (slowest) -->
  <rect x="148" y="218" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="185" y="218" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="222" y="218" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="259" y="218" width="34" height="26" rx="2" fill="#140814" stroke="#27272a" stroke-width="0.3"/>
  <rect x="296" y="218" width="34" height="26" rx="2" fill="#481018" stroke="#3f3f46" stroke-width="0.3"/>
  <rect x="333" y="218" width="34" height="26" rx="2" fill="#a82828" stroke="#52525b" stroke-width="0.3"/>
  <rect x="370" y="218" width="34" height="26" rx="2" fill="#e07820" stroke="#71717a" stroke-width="0.3"/>

  <!-- Ellipsis row (more rows below) -->
  <text class="tsa" x="165" y="262" text-anchor="middle">·</text>
  <text class="tsa" x="202" y="262" text-anchor="middle">·</text>
  <text class="tsa" x="239" y="262" text-anchor="middle">·</text>
  <text class="tsa" x="276" y="262" text-anchor="middle">·</text>
  <text class="tsa" x="313" y="262" text-anchor="middle">·</text>
  <text class="tsa" x="350" y="262" text-anchor="middle">·</text>
  <text class="tsa" x="387" y="262" text-anchor="middle">·</text>

  <!-- Ellipsis col (more cols to right) -->
  <text class="tsa" x="422" y="131" text-anchor="start">···</text>

  <!-- Velocity axis (left) -->
  <line class="axis-line" x1="138" y1="44" x2="138" y2="244" stroke-width="0.75" marker-end="url(#arrow)"/>
  <text class="tsa" x="132" y="48"  text-anchor="end" dominant-baseline="central">fast</text>
  <text class="tsa" x="132" y="244" text-anchor="end" dominant-baseline="central">slow</text>
  <text class="tsh" x="54" y="144" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 54 144)">velocity</text>

  <!-- Gyradius axis (bottom) -->
  <line class="axis-line" x1="148" y1="256" x2="404" y2="256" stroke-width="0.75" marker-end="url(#arrow)"/>
  <text class="tsa" x="148" y="270" text-anchor="start">compact</text>
  <text class="tsa" x="404" y="270" text-anchor="end">spread</text>
  <text class="tsh" x="276" y="288" text-anchor="middle">gyradius</text>

  <!-- Spectral entropy: right-side annotation with bracket -->
  <line class="axis-line" x1="416" y1="44" x2="416" y2="244" stroke-width="0.75" stroke-dasharray="4 3"/>
  <line class="axis-line" x1="416" y1="44" x2="422" y2="44"   stroke-width="0.75"/>
  <line class="axis-line" x1="416" y1="244" x2="422" y2="244" stroke-width="0.75"/>
  <text class="tsa" x="428" y="48"  text-anchor="start" dominant-baseline="central">high entropy (sharp)</text>
  <text class="tsa" x="428" y="244" text-anchor="start" dominant-baseline="central">low entropy (smooth)</text>
  <text class="tsh" x="620" y="144" text-anchor="middle" dominant-baseline="central" transform="rotate(90 620 144)">spectral entropy</text>

  <!-- Legend -->
  <rect x="148" y="16" width="12" height="10" rx="2" fill="#fcd880" stroke="#d4d4d8" stroke-width="0.5"/>
  <text class="tsax" x="164" y="24" dominant-baseline="central">occupied — best creature for this behavioral fingerprint</text>
  <rect x="148" y="300" width="12" height="10" rx="2" fill="#140814" stroke="#52525b" stroke-width="0.5"/>
  <text class="tsax" x="164" y="308" dominant-baseline="central">empty — search has not found a creature here yet</text>
</svg>
