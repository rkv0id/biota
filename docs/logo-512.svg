<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0d0221"/>
  <!-- 5x5 MAP-Elites grid, centered, magma palette, realistic sparse fill -->
  <!-- cell size 64px, gap 12px, total grid = 5*64 + 4*12 = 368, offset = (512-368)/2 = 72 -->
  <!-- row 0 - sparse top -->
  <rect x="72"  y="72"  width="64" height="64" rx="8" fill="#0d0221" opacity="0.4"/>
  <rect x="148" y="72"  width="64" height="64" rx="8" fill="#3b0f70" opacity="0.5"/>
  <rect x="224" y="72"  width="64" height="64" rx="8" fill="#3b0f70"/>
  <rect x="300" y="72"  width="64" height="64" rx="8" fill="#0d0221" opacity="0.3"/>
  <rect x="376" y="72"  width="64" height="64" rx="8" fill="#0d0221" opacity="0.2"/>
  <!-- row 1 -->
  <rect x="72"  y="148" width="64" height="64" rx="8" fill="#3b0f70"/>
  <rect x="148" y="148" width="64" height="64" rx="8" fill="#8c2981"/>
  <rect x="224" y="148" width="64" height="64" rx="8" fill="#8c2981"/>
  <rect x="300" y="148" width="64" height="64" rx="8" fill="#3b0f70" opacity="0.6"/>
  <rect x="376" y="148" width="64" height="64" rx="8" fill="#0d0221" opacity="0.3"/>
  <!-- row 2 - densest, brightest -->
  <rect x="72"  y="224" width="64" height="64" rx="8" fill="#8c2981"/>
  <rect x="148" y="224" width="64" height="64" rx="8" fill="#de4968"/>
  <rect x="224" y="224" width="64" height="64" rx="8" fill="#fe9f6d"/>
  <rect x="300" y="224" width="64" height="64" rx="8" fill="#de4968"/>
  <rect x="376" y="224" width="64" height="64" rx="8" fill="#8c2981"/>
  <!-- row 3 -->
  <rect x="72"  y="300" width="64" height="64" rx="8" fill="#3b0f70" opacity="0.6"/>
  <rect x="148" y="300" width="64" height="64" rx="8" fill="#8c2981"/>
  <rect x="224" y="300" width="64" height="64" rx="8" fill="#de4968"/>
  <rect x="300" y="300" width="64" height="64" rx="8" fill="#fece91"/>
  <rect x="376" y="300" width="64" height="64" rx="8" fill="#fe9f6d"/>
  <!-- row 4 - sparse bottom -->
  <rect x="72"  y="376" width="64" height="64" rx="8" fill="#0d0221" opacity="0.3"/>
  <rect x="148" y="376" width="64" height="64" rx="8" fill="#3b0f70" opacity="0.5"/>
  <rect x="224" y="376" width="64" height="64" rx="8" fill="#8c2981" opacity="0.7"/>
  <rect x="300" y="376" width="64" height="64" rx="8" fill="#de4968"/>
  <rect x="376" y="376" width="64" height="64" rx="8" fill="#fe9f6d"/>
</svg>
