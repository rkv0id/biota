<svg width="100%" viewBox="0 0 780 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>biota signal field mechanics</title>
  <defs>
    <marker id="a" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1.5 1.5L6.5 4L1.5 6.5" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="a-teal" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1.5 1.5L6.5 4L1.5 6.5" fill="none" stroke="#3cdcc8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="a-amber" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1.5 1.5L6.5 4L1.5 6.5" fill="none" stroke="#fbbf77" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="a-purple" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1.5 1.5L6.5 4L1.5 6.5" fill="none" stroke="#a78bfa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
</defs>

  <!-- ═══════════════════  LEFT COLUMN  ═══════════════════ -->
  <!-- Mass t -->
  <rect x="20" y="20" width="148" height="44" rx="5" fill="#16181f" stroke="#3a3d52" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="36" y="37" fill="#71717a">MASS FIELD</text>
  <text font-size="9.5" fill="#a1a1aa" x="36" y="53">A(H, W) &nbsp;t</text>
  <line x1="94" y1="64" x2="94" y2="82" stroke="#71717a" stroke-width="1.1" marker-end="url(#a)"/>

  <!-- Convolve mass -->
  <rect x="20" y="84" width="148" height="38" rx="5" fill="#16181f" stroke="#3a3d52" stroke-width="1"/>
  <text font-size="9.5" fill="#a1a1aa" x="94" y="99" text-anchor="middle">convolve</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="94" y="113" text-anchor="middle">fft(A) × fK</text>
  <line x1="94" y1="122" x2="94" y2="140" stroke="#3cdcc8" stroke-width="1.1" marker-end="url(#a-teal)"/>

  <!-- Growth G -->
  <rect x="20" y="142" width="148" height="44" rx="5" fill="#0f1f1e" stroke="#3cdcc8" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="36" y="159" fill="#3cdcc8">GROWTH G</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="36" y="175">G(H, W)</text>
  <line x1="94" y1="186" x2="94" y2="204" stroke="#3cdcc8" stroke-width="1.1" marker-end="url(#a-teal)"/>

  <!-- Alpha coupling -->
  <rect x="20" y="206" width="148" height="50" rx="5" fill="#0f1f1e" stroke="#3cdcc8" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="36" y="223" fill="#3cdcc8">&#945; COUPLING</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="36" y="237">G &#215; (1 + &#945;&#183;recep)</text>
  <text font-size="8" fill="#52525b" font-style="italic" x="36" y="250">clamp(min=0)</text>
  <line x1="94" y1="256" x2="94" y2="274" stroke="#fbbf77" stroke-width="1.1" marker-end="url(#a-amber)"/>

  <!-- Emission -->
  <rect x="20" y="276" width="148" height="44" rx="5" fill="#1e1508" stroke="#fbbf77" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="36" y="293" fill="#fbbf77">EMISSION</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="36" y="308">G&#8314; &#215; rate_eff &#215; ev</text>
  <line x1="94" y1="320" x2="94" y2="338" stroke="#71717a" stroke-width="1.1" marker-end="url(#a)"/>

  <!-- Mass t+1 -->
  <rect x="20" y="340" width="148" height="44" rx="5" fill="#16181f" stroke="#3a3d52" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="36" y="357" fill="#71717a">MASS FIELD</text>
  <text font-size="9.5" fill="#a1a1aa" x="36" y="373">A(H, W) &nbsp;t+1</text>

  <!-- ═══════════════════  RIGHT COLUMN  ═══════════════════ -->
  <!-- Signal t -->
  <rect x="612" y="20" width="148" height="44" rx="5" fill="#16181f" stroke="#3cdcc8" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="628" y="37" fill="#3cdcc8">SIGNAL FIELD</text>
  <text font-size="9.5" fill="#a1a1aa" x="628" y="53">S(H, W, C) &nbsp;t</text>
  <line x1="686" y1="64" x2="686" y2="82" stroke="#3cdcc8" stroke-width="1.1" marker-end="url(#a-teal)"/>

  <!-- Convolve signal -->
  <rect x="612" y="84" width="148" height="38" rx="5" fill="#16181f" stroke="#3a3d52" stroke-width="1"/>
  <text font-size="9.5" fill="#a1a1aa" x="686" y="99" text-anchor="middle">convolve</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="686" y="113" text-anchor="middle">fft(S) × fK_sig</text>
  <line x1="686" y1="122" x2="686" y2="140" stroke="#a78bfa" stroke-width="1.1" marker-end="url(#a-purple)"/>

  <!-- Reception -->
  <rect x="612" y="142" width="148" height="44" rx="5" fill="#110f1e" stroke="#a78bfa" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="628" y="159" fill="#a78bfa">RECEPTION</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="628" y="175">dot(S&#771;, rp) &#8594; recep</text>
  <line x1="686" y1="186" x2="686" y2="204" stroke="#a78bfa" stroke-width="1.1" marker-end="url(#a-purple)"/>

  <!-- Beta modulation -->
  <rect x="612" y="206" width="148" height="50" rx="5" fill="#110f1e" stroke="#a78bfa" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="628" y="223" fill="#a78bfa">&#946; MODULATION</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="628" y="238">rate&#215;(1+&#946;&#183;mean(recep))</text>
  <text font-size="8" fill="#52525b" font-style="italic" x="628" y="251">clip to [0, 0.1]</text>
  <line x1="686" y1="256" x2="686" y2="274" stroke="#3cdcc8" stroke-width="1.1" marker-end="url(#a-teal)"/>

  <!-- Decay -->
  <rect x="612" y="276" width="148" height="44" rx="5" fill="#1e0f0f" stroke="#ff6464" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="628" y="293" fill="#ff6464">DECAY</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="628" y="308">S &#215; (1 &#8722; dr)</text>
  <line x1="686" y1="320" x2="686" y2="338" stroke="#3cdcc8" stroke-width="1.1" marker-end="url(#a-teal)"/>

  <!-- Signal t+1 -->
  <rect x="612" y="340" width="148" height="44" rx="5" fill="#16181f" stroke="#3cdcc8" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="628" y="357" fill="#3cdcc8">SIGNAL FIELD</text>
  <text font-size="9.5" fill="#a1a1aa" x="628" y="373">S(H, W, C) &nbsp;t+1</text>

  <!-- ═══════════════════  CENTRE  ═══════════════════ -->
  <!-- Parameters box -->
  <rect x="200" y="20" width="360" height="108" rx="5" fill="#16181f" stroke="#3a3d52" stroke-width="1"/>
  <text font-size="9" font-weight="600" letter-spacing="0.08em" text-anchor="start" x="216" y="38" fill="#71717a">SIGNAL PARAMETERS</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="216" y="54" fill="#fbbf77">ev</text>
  <text font-size="8" fill="#52525b"  x="232" y="54"> emission_vector &nbsp;(C,) [0,1]</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="216" y="68" fill="#a78bfa">rp</text>
  <text font-size="8" fill="#52525b"  x="232" y="68"> receptor_profile (C,) [&#8722;1,1] &nbsp;neg=inhibitory</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="216" y="82" fill="#3cdcc8">&#945;</text>
  <text font-size="8" fill="#52525b"  x="227" y="82"> alpha_coupling &nbsp;[&#8722;1,1] &nbsp;chemotaxis / repulsion</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="216" y="96" fill="#a78bfa">&#946;</text>
  <text font-size="8" fill="#52525b"  x="227" y="96"> beta_modulation [&#8722;1,1] &nbsp;quorum / inhibition</text>
  <text font-size="8" fill="#52525b"  x="216" y="116" fill="#3a3d52">rate, decay_rates, signal_kernel_* &nbsp;&#8212; &nbsp;static per-creature params</text>

  <!-- Conservation box -->
  <rect x="200" y="340" width="360" height="44" rx="5" fill="#16181f" stroke="#3a3d52" stroke-width="1"/>
  <text font-size="9.5" fill="#a1a1aa" x="380" y="358" text-anchor="middle">conservation</text>
  <text font-size="8.5" font-family="monospace" fill="#71717a" x="380" y="375" text-anchor="middle">&#931; A(t+1) + &#931; S(t+1) &#8804; &#931; A(t) + &#931; S(t)</text>
  <line x1="168" y1="362" x2="198" y2="362" stroke="#3a3d52" stroke-width="1" marker-end="url(#a)"/>
  <line x1="612" y1="362" x2="562" y2="362" stroke="#3a3d52" stroke-width="1" marker-end="url(#a)"/>

  <!-- ═══════════════════  CROSS ARROWS  ═══════════════════ -->
  <!-- Alpha: reception → alpha coupling (right to left, at row 231) -->
  <path d="M612 231 L170 231" fill="none" stroke="#3cdcc8" stroke-width="1.3"
        stroke-dasharray="5 3" marker-end="url(#a-teal)"/>
  <text font-size="8" fill="#52525b" x="390" y="225" text-anchor="middle" fill="#3cdcc8">&#945; &nbsp;reception &#8594; growth multiplier</text>

  <!-- Beta: reception → emission rate (curved through centre, row 256→298) -->
  <path d="M612 248 C560 248 560 298 170 298" fill="none" stroke="#a78bfa" stroke-width="1.3"
        stroke-dasharray="5 3" marker-end="url(#a-purple)"/>
  <text font-size="8" fill="#52525b" x="390" y="290" text-anchor="middle" fill="#a78bfa">&#946; &nbsp;mean(reception) &#8594; modulate rate</text>

  <!-- Emission drain: left emission → right signal (amber, at row 316) -->
  <path d="M168 316 L612 316" fill="none" stroke="#fbbf77" stroke-width="1.3"
        stroke-dasharray="5 3" marker-end="url(#a-amber)"/>
  <text font-size="8" fill="#52525b" x="390" y="310" text-anchor="middle" fill="#fbbf77">emission drains mass, adds to signal field</text>

  <!-- ═══════════════════  FOOTER  ═══════════════════ -->
  <text font-size="8" fill="#52525b" font-style="italic" x="390" y="420" text-anchor="middle">decay is the only leak &nbsp;&#8212; &nbsp;&#931;(mass + signal) is conserved modulo decay</text>
</svg>
