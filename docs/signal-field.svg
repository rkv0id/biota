<svg width="100%" viewBox="0 0 760 460" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>biota signal field mechanics</title>
  <desc>One simulation step with signal field active. Mass and signal fields evolve together via emission (amber), reception-to-growth coupling alpha (teal), and adaptive emission modulation beta (purple). Signal decays per-channel. Total conserved quantity is mass + signal.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3cdcc8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#fbbf77" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .ts     { font-size: 11px; font-weight: 400; fill: #a1a1aa; }
      .tsa    { font-size: 10px; font-weight: 400; fill: #71717a; }
      .tlabel { font-size: 10px; font-weight: 500; fill: #52525b; letter-spacing: 0.07em; }
      .tcode  { font-size: 10px; font-family: "SF Mono", "Fira Code", monospace; fill: #71717a; }
    </style>
  </defs>

  <!-- Left: Mass field column -->
  <rect x="28" y="28" width="140" height="48" rx="6" fill="#16181f" stroke="#2e3044" stroke-width="1"/>
  <text class="tlabel" x="44" y="46">MASS FIELD</text>
  <text class="ts" x="44" y="64">A(H, W)  t</text>
  <line x1="98" y1="76" x2="98" y2="106" stroke="#a1a1aa" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="28" y="108" width="140" height="40" rx="6" fill="#16181f" stroke="#2e3044" stroke-width="1"/>
  <text class="ts" x="98" y="124" text-anchor="middle">convolve</text>
  <text class="tcode" x="98" y="138" text-anchor="middle">fft(A) × fK</text>
  <line x1="98" y1="148" x2="98" y2="178" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arr-teal)"/>

  <rect x="28" y="180" width="140" height="48" rx="6" fill="#1a2228" stroke="#3cdcc8" stroke-width="1"/>
  <text class="tlabel" x="44" y="198" fill="#3cdcc8">GROWTH G</text>
  <text class="ts" x="44" y="214">G(H, W)</text>
  <line x1="98" y1="228" x2="98" y2="258" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arr-teal)"/>

  <rect x="28" y="260" width="140" height="48" rx="6" fill="#1a2228" stroke="#3cdcc8" stroke-width="1"/>
  <text class="tlabel" x="44" y="278" fill="#3cdcc8">α COUPLING</text>
  <text class="tcode" x="44" y="293">G×(1+α·recep)</text>
  <text class="tsa" x="44" y="305" fill="#52525b">clamp(min=0)</text>
  <line x1="98" y1="308" x2="98" y2="334" stroke="#fbbf77" stroke-width="1.2" marker-end="url(#arr-amber)"/>

  <rect x="28" y="336" width="140" height="40" rx="6" fill="#16181f" stroke="#fbbf77" stroke-width="1"/>
  <text class="ts" x="98" y="352" text-anchor="middle" fill="#fbbf77">emission</text>
  <text class="tcode" x="98" y="366" text-anchor="middle">G⁺×rate_eff×ev</text>
  <line x1="98" y1="376" x2="98" y2="402" stroke="#a1a1aa" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="28" y="404" width="140" height="40" rx="6" fill="#16181f" stroke="#2e3044" stroke-width="1"/>
  <text class="tlabel" x="44" y="422">MASS FIELD</text>
  <text class="ts" x="44" y="438">A(H, W)  t+1</text>

  <!-- Right: Signal field column -->
  <rect x="592" y="28" width="140" height="48" rx="6" fill="#16181f" stroke="#3cdcc8" stroke-width="1"/>
  <text class="tlabel" x="608" y="46" fill="#3cdcc8">SIGNAL FIELD</text>
  <text class="ts" x="608" y="64">S(H, W, C)  t</text>
  <line x1="662" y1="76" x2="662" y2="106" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arr-teal)"/>

  <rect x="592" y="108" width="140" height="40" rx="6" fill="#16181f" stroke="#2e3044" stroke-width="1"/>
  <text class="ts" x="662" y="124" text-anchor="middle">convolve</text>
  <text class="tcode" x="662" y="138" text-anchor="middle">fft(S) × fK_sig</text>
  <line x1="662" y1="148" x2="662" y2="178" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arr-purple)"/>

  <rect x="592" y="180" width="140" height="48" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1"/>
  <text class="tlabel" x="608" y="198" fill="#a78bfa">RECEPTION</text>
  <text class="tcode" x="608" y="214">dot(S̃, rp) → recep</text>
  <line x1="662" y1="228" x2="662" y2="258" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arr-purple)"/>

  <rect x="592" y="260" width="140" height="48" rx="6" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1"/>
  <text class="tlabel" x="608" y="278" fill="#a78bfa">β MODULATION</text>
  <text class="tcode" x="608" y="294">rate×(1+β·mean(recep))</text>
  <line x1="662" y1="308" x2="662" y2="334" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arr-teal)"/>

  <rect x="592" y="336" width="140" height="40" rx="6" fill="#16181f" stroke="#ff6464" stroke-width="1"/>
  <text class="ts" x="662" y="352" text-anchor="middle" fill="#ff6464">decay</text>
  <text class="tcode" x="662" y="366" text-anchor="middle">S × (1 − dr)</text>
  <line x1="662" y1="376" x2="662" y2="402" stroke="#3cdcc8" stroke-width="1.2" marker-end="url(#arr-teal)"/>

  <rect x="592" y="404" width="140" height="40" rx="6" fill="#16181f" stroke="#3cdcc8" stroke-width="1"/>
  <text class="tlabel" x="608" y="422" fill="#3cdcc8">SIGNAL FIELD</text>
  <text class="ts" x="608" y="438">S(H, W, C)  t+1</text>

  <!-- Cross arrows -->
  <!-- Alpha: reception → G coupling -->
  <path d="M592 284 C500 284 290 284 170 284" fill="none" stroke="#3cdcc8" stroke-width="1.4"
        stroke-dasharray="5 3" marker-end="url(#arr-teal)"/>
  <text class="tsa" x="380" y="276" text-anchor="middle" fill="#3cdcc8">α: reception → growth multiplier</text>

  <!-- Beta: reception → emission rate (loops back) -->
  <path d="M592 300 C555 300 555 356 170 356" fill="none" stroke="#a78bfa" stroke-width="1.4"
        stroke-dasharray="5 3" marker-end="url(#arr-purple)"/>
  <text class="tsa" x="380" y="348" text-anchor="middle" fill="#a78bfa">β: mean(reception) → modulate emission rate</text>

  <!-- Emission: mass → signal -->
  <path d="M168 373" fill="none" stroke="#fbbf77"/>
  <path d="M168 370 C300 370 460 370 590 370" fill="none" stroke="#fbbf77" stroke-width="1.4"
        stroke-dasharray="5 3" marker-end="url(#arr-amber)"/>
  <text class="tsa" x="380" y="388" text-anchor="middle" fill="#fbbf77">emission drains mass, adds to signal</text>

  <!-- Conservation -->
  <rect x="240" y="404" width="280" height="40" rx="6" fill="#16181f" stroke="#2e3044" stroke-width="1"/>
  <text class="ts" x="380" y="420" text-anchor="middle">conservation</text>
  <text class="tcode" x="380" y="436" text-anchor="middle">Σ A(t+1) + Σ S(t+1) ≤ Σ A(t) + Σ S(t)</text>
  <line x1="168" y1="424" x2="238" y2="424" stroke="#2e3044" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="592" y1="424" x2="522" y2="424" stroke="#2e3044" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Legend / param table -->
  <rect x="240" y="28" width="300" height="108" rx="6" fill="#16181f" stroke="#2e3044" stroke-width="1"/>
  <text class="tlabel" x="256" y="46">SIGNAL PARAMETERS</text>
  <text class="tcode" x="256" y="62" fill="#fbbf77">ev</text><text class="tsa" x="272" y="62"> emission_vector (C,) [0,1]</text>
  <text class="tcode" x="256" y="76" fill="#a78bfa">rp</text><text class="tsa" x="272" y="76"> receptor_profile (C,) [−1,1]  neg=inhibitory</text>
  <text class="tcode" x="256" y="90" fill="#3cdcc8">α</text><text class="tsa" x="264" y="90"> alpha_coupling [−1,1]  chemotaxis / repulsion</text>
  <text class="tcode" x="256" y="104" fill="#a78bfa">β</text><text class="tsa" x="264" y="104"> beta_modulation [−1,1]  quorum / inhibition</text>
  <text class="tsa" x="256" y="120" fill="#52525b">rate, decay_rates, signal_kernel_*: static per-creature params</text>
</svg>
