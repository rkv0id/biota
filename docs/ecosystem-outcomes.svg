<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>biota ecosystem outcome taxonomy</title>
  <desc>Six outcome labels produced by the temporal classifier. Heterogeneous runs: coexistence, exclusion, merger, fragmentation. Homogeneous runs: stable isolation, cannibalism.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .th     { font-size: 12px; font-weight: 500; fill: #e4e4e7; }
      .ts     { font-size: 10px; font-weight: 400; fill: #a1a1aa; }
      .tsa    { font-size: 9px;  font-weight: 400; fill: #71717a; }
      .tlabel { font-size: 10px; font-weight: 500; fill: #52525b; letter-spacing: 0.07em; }
    </style>
  </defs>

  <!-- Section headers -->
  <text class="tlabel" x="28"  y="16">HETEROGENEOUS RUNS</text>
  <text class="tlabel" x="516" y="16">HOMOGENEOUS RUNS</text>

  <!-- ══ ROW 1 ══ -->

  <!-- COEXISTENCE: x=28, y=28, w=148, h=196 -->
  <rect x="28" y="28" width="148" height="196" rx="6" fill="#16181f" stroke="#3cdcc8" stroke-width="1"/>
  <text class="th"  x="102" y="52"  text-anchor="middle" fill="#3cdcc8">coexistence</text>
  <text class="ts"  x="102" y="68"  text-anchor="middle">both stable</text>
  <rect x="40"  y="80"  width="124" height="68" rx="3" fill="#0d0f14"/>
  <polyline points="44,130 60,128 76,130 92,128 108,130 124,128 140,130 156,128" fill="none" stroke="#ff8c32" stroke-width="1.5"/>
  <polyline points="44,140 60,139 76,140 92,139 108,140 124,139 140,140 156,139" fill="none" stroke="#50b4ff" stroke-width="1.5"/>
  <text class="tsa" x="44"  y="160" fill="#ff8c32">s1 stable</text>
  <text class="tsa" x="108" y="160" fill="#50b4ff">s2 stable</text>
  <text class="tsa" x="102" y="178" text-anchor="middle">both species maintain</text>
  <text class="tsa" x="102" y="192" text-anchor="middle">mass and territory</text>
  <text class="tsa" x="102" y="207" text-anchor="middle">signal mediates spacing</text>

  <!-- EXCLUSION: x=192, y=28, w=148, h=196 -->
  <rect x="192" y="28" width="148" height="196" rx="6" fill="#16181f" stroke="#ff6464" stroke-width="1"/>
  <text class="th"  x="266" y="52"  text-anchor="middle" fill="#ff6464">exclusion</text>
  <text class="ts"  x="266" y="68"  text-anchor="middle">one wins</text>
  <rect x="204" y="80"  width="124" height="68" rx="3" fill="#0d0f14"/>
  <polyline points="208,138 224,134 240,128 256,122 272,116 288,112 304,108 316,104 320,102" fill="none" stroke="#ff8c32" stroke-width="1.5"/>
  <polyline points="208,122 224,126 240,130 256,134 272,138 288,142 304,145 316,147 320,148" fill="none" stroke="#50b4ff" stroke-width="1.5"/>
  <text class="tsa" x="208" y="160" fill="#ff8c32">s1 ↑</text>
  <text class="tsa" x="274" y="160" fill="#50b4ff">s2 ↓</text>
  <text class="tsa" x="266" y="178" text-anchor="middle">one species steadily</text>
  <text class="tsa" x="266" y="192" text-anchor="middle">outcompetes and</text>
  <text class="tsa" x="266" y="207" text-anchor="middle">eliminates the other</text>

  <!-- FRAGMENTATION: x=356, y=28, w=148, h=196 -->
  <rect x="356" y="28" width="148" height="196" rx="6" fill="#16181f" stroke="#fbbf24" stroke-width="1"/>
  <text class="th"  x="430" y="52"  text-anchor="middle" fill="#fbbf24">fragmentation</text>
  <text class="ts"  x="430" y="68"  text-anchor="middle">patches form</text>
  <rect x="368" y="80"  width="124" height="68" rx="3" fill="#0d0f14"/>
  <polyline points="372,126 384,120 396,130 408,118 420,128 432,116 444,126 456,118 468,124 480,116 484,120" fill="none" stroke="#ff8c32" stroke-width="1.5"/>
  <polyline points="372,138 384,142 396,134 408,140 420,136 432,142 444,134 456,140 468,136 480,142 484,138" fill="none" stroke="#50b4ff" stroke-width="1.5"/>
  <text class="tsa" x="368" y="160" fill="#ff8c32">s1 ~</text>
  <text class="tsa" x="432" y="160" fill="#50b4ff">s2 ~</text>
  <text class="tsa" x="430" y="178" text-anchor="middle">patches form and break</text>
  <text class="tsa" x="430" y="192" text-anchor="middle">under competitive or</text>
  <text class="tsa" x="430" y="207" text-anchor="middle">signal-mediated pressure</text>

  <!-- STABLE ISOLATION: x=520, y=28, w=148, h=196 -->
  <rect x="520" y="28" width="148" height="196" rx="6" fill="#16181f" stroke="#a78bfa" stroke-width="1"/>
  <text class="th"  x="594" y="52"  text-anchor="middle" fill="#a78bfa">stable isolation</text>
  <text class="ts"  x="594" y="68"  text-anchor="middle">copies separate</text>
  <rect x="532" y="80"  width="124" height="68" rx="3" fill="#0d0f14"/>
  <polyline points="536,126 552,125 568,126 584,125 600,126 616,125 632,126 648,125 652,126" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <polyline points="536,120 545,120 546,128 568,128 600,128 648,128 652,128" fill="none" stroke="#52525b" stroke-width="1" stroke-dasharray="3 2"/>
  <text class="tsa" x="532" y="160" fill="#a78bfa">mass stable</text>
  <text class="tsa" x="594" y="178" text-anchor="middle">copies remain spatially</text>
  <text class="tsa" x="594" y="192" text-anchor="middle">separate and stable</text>
  <text class="tsa" x="594" y="207" text-anchor="middle">throughout the run</text>

  <!-- Time axis row 1 -->
  <text class="tsa" x="340" y="238" text-anchor="middle">← time →</text>

  <!-- ══ ROW 2 ══ -->

  <!-- MERGER: x=28, y=248, w=148, h=196 -->
  <rect x="28" y="248" width="148" height="196" rx="6" fill="#16181f" stroke="#3cdcc8" stroke-width="0.8"/>
  <text class="th"  x="102" y="272" text-anchor="middle" fill="#3cdcc8">merger</text>
  <text class="ts"  x="102" y="288" text-anchor="middle">boundaries dissolve</text>
  <rect x="40"  y="300" width="124" height="68" rx="3" fill="#0d0f14"/>
  <polyline points="44,340 60,336 76,332 92,328 108,325 124,322 140,320 156,320" fill="none" stroke="#ff8c32" stroke-width="1.5"/>
  <polyline points="44,310 60,314 76,318 92,322 108,324 124,322 140,322 156,322" fill="none" stroke="#50b4ff" stroke-width="1.5"/>
  <text class="tsa" x="44"  y="380" fill="#ff8c32">s1</text>
  <text class="tsa" x="80"  y="380" fill="#50b4ff">s2</text>
  <text class="tsa" x="124" y="380" fill="#3cdcc8">→ blended</text>
  <text class="tsa" x="102" y="398" text-anchor="middle">species boundaries</text>
  <text class="tsa" x="102" y="412" text-anchor="middle">dissolve — mass</text>
  <text class="tsa" x="102" y="427" text-anchor="middle">intermixes into one</text>

  <!-- CANNIBALISM: x=520, y=248, w=148, h=196 -->
  <rect x="520" y="248" width="148" height="196" rx="6" fill="#16181f" stroke="#a78bfa" stroke-width="0.8"/>
  <text class="th"  x="594" y="272" text-anchor="middle" fill="#a78bfa">cannibalism</text>
  <text class="ts"  x="594" y="288" text-anchor="middle">copies absorb copies</text>
  <rect x="532" y="300" width="124" height="68" rx="3" fill="#0d0f14"/>
  <polyline points="536,310 552,310 568,312 584,318 600,326 616,334 632,336 648,336 652,336" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <polyline points="536,316 545,316 546,324 558,328 570,332 582,340 594,352 606,356 648,358 652,358" fill="none" stroke="#52525b" stroke-width="1" stroke-dasharray="3 2"/>
  <text class="tsa" x="532" y="380" fill="#a78bfa">mass ↓</text>
  <text class="tsa" x="594" y="398" text-anchor="middle">copies absorb each</text>
  <text class="tsa" x="594" y="412" text-anchor="middle">other — some grow</text>
  <text class="tsa" x="594" y="427" text-anchor="middle">at others' expense</text>

  <!-- Time axis row 2 -->
  <text class="tsa" x="340" y="458" text-anchor="middle">← time →</text>

</svg>
